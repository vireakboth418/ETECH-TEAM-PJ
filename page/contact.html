<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        .banner{
            position: relative;
            height: 450px;
            overflow: hidden;
        }

        .banner img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .banner:before{
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.45);
        }

        .banner-content{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            text-align: center;
            color: white;
        }

        .info-card{
            transition: .3s;
        }

        .info-card:hover{
            transform: translateY(-8px);
        }

        .newsletter{
            background: #0d6efd;
            color: white;
        }
    </style>
</head>

<body>

    <!--  Banner -->

    <div class="banner">

        <img src="/img/contact.jpg" alt="Banner">
        <div class="banner-content">
            <h1 class="display-3 fw-bold">Contact Us</h1>
            <p class="fs-4">We're here to answer your questions.</p>
        </div>

    </div>

    <!-- Contact Information  -->

    <div class="container py-5">

        <div class="row g-4 text-center">

            <!-- Address -->
            <div class="col-md-4">
                <div class="card shadow info-card h-100">
                    <div class="card-body">

                        <i class="bi bi-geo-alt-fill fs-1 text-primary"></i>

                        <h4 class="mt-3">Address</h4>

                        <p>
                            Phnom Penh,
                            Cambodia
                        </p>

                    </div>
                </div>
            </div>

            <!-- Email -->
            <div class="col-md-4">
                <div class="card shadow info-card h-100">
                    <div class="card-body">

                        <i class="bi bi-envelope-fill fs-1 text-danger"></i>

                        <h4 class="mt-3">Email</h4>

                        <p>eshop168@gmail.com</p>

                    </div>
                </div>
            </div>

            <!-- Phone -->
            <div class="col-md-4">
                <div class="card shadow info-card h-100">
                    <div class="card-body">

                        <i class="bi bi-telephone-fill fs-1 text-success"></i>

                        <h4 class="mt-3">Phone</h4>

                        <p>+855 978057709</p>

                    </div>
                </div>
            </div>

        </div>

    </div>
<footer class="bg-dark text-white text-center py-4">
    <div class="container">
        <h4 style="color: rgb(254, 253, 255); font-weight: bold;">E-Shop</h4>
        <p class="mb-2">© 2026 All Rights Reserved</p>

    <div>
        <i class="bi bi-facebook fs-4 me-3"></i>
        <i class="bi bi-instagram fs-4 me-3"></i>
        <i class="bi bi-youtube fs-4"></i>
    </div>

    <div class="mt-4">
        <a href="index.html" class="btn btn-outline-light btn-danger ">
        Back Home
        </a>

    </div>
</div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
