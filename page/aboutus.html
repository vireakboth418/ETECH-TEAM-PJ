<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        .hero{

            position: relative;
            height: 600px;
            height: 100vh;
            overflow: hidden;
        }

        .hero img{
            width:100%;
            height:100%;
            object-fit:cover;
            align-items:center;
        }

        .overlay{
            position:absolute;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,.5);
        }

        .hero-text{
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%,-50%);
            color:white;
            text-align:center;
            width:80%;
        }

        .hero-text h1{
            font-size:60px;
            font-weight:bold;
        }

        .hero-text p{
            font-size:20px;
        }

    </style>

</head>
<body>

<!-- Banner -->
<div class="hero">

    <img src="/img/about.jpg" alt="">

    <div class="overlay"></div>

    <div class="hero-text">
        <h1>About Us</h1>

        <p>
            Welcome to E-Shop. We provide high-quality products with
            the best prices and excellent customer service. 
            E-Shop is the best place to find the latest gadgets, fashion, and home essentials.
        </p>
        <h3>Follow Us</h3>
<div class="overlay">
</div>
    <a href="index.html" class="btn btn-danger btn-lg mt-3">Back Home</a>

</div>
<div> 
</div>

<h3>Follow Us</h3>
<div>

<i class="bi bi-facebook fs-4 me-3"></i>

<i class="bi bi-instagram fs-4 me-3"></i>

<i class="bi bi-youtube fs-4"></i>

</div>
</body>
</html>
